<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwiftCart Store</title>

    <!-- font awesome -->
    <script
      src="https://kit.fontawesome.com/69628e32c7.js"
      crossorigin="anonymous"
    ></script>
    <!-- css connect -->
    <link rel="stylesheet" href="./src/output.css" />
  </head>
  <body class="font-roboto">
    <!-- navbar start -->
    <section>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="navbar-start">
          <a class="btn btn-ghost text-xl text-blue-600">SwiftCart</a>
        </div>
        <div class="navbar-center hidden lg:flex">
          <ul class="menu menu-horizontal px-1">
            <li><a>Home</a></li>
            <li><a>Products</a></li>
            <li><a>About</a></li>
            <li><a>Contacts</a></li>
          </ul>
        </div>
        <div class="navbar-end">
          <a class="btn"><i class="fa-solid fa-cart-shopping"></i></a>
          <div class="dropdown dropdown-end">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
              <i class="fa-solid fa-bars"></i>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-28 p-2 shadow"
            >
              <li><a>Home</a></li>
              <li><a>Products</a></li>
              <li><a>About</a></li>
              <li><a>Contacts</a></li>
            </ul>
          </div>
        </div>
      </div>
    </section>
    <!-- navbar ends -->

    <script src="./script/index.js"></script>
  </body>
</html>
